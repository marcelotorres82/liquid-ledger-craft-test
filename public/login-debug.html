<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Debug - App Financeiro</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background: #f5f5f5; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .debug { background: #f8f9fa; padding: 15px; margin: 20px 0; border-radius: 4px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .info { color: #17a2b8; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login - Modo Debug</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="login">Login:</label>
                <input type="text" id="login" value="marcelo" required>
            </div>
            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
        
        <div class="debug" id="debug">
            <strong>Debug Log:</strong><br>
        </div>
        
        <button onclick="clearStorage()" style="margin-top: 10px; background: #dc3545;">Limpar LocalStorage</button>
        <button onclick="testRedirect()" style="margin-top: 10px; background: #28a745;">Testar Redirecionamento</button>
    </div>

    <script src="/assets/js/api-config.js"></script>
    <script>
        const debugDiv = document.getElementById('debug');
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const colorClass = type === 'success' ? 'success' : type === 'error' ? 'error' : 'info';
            debugDiv.innerHTML += `<div class="${colorClass}">[${timestamp}] ${message}</div>`;
            debugDiv.scrollTop = debugDiv.scrollHeight;
            console.log(`[${timestamp}] ${message}`);
        }
        
        // Verificar localStorage ao carregar
        window.addEventListener('load', () => {
            log('Página carregada', 'info');
            log(`Token: ${localStorage.getItem('app_token') ? 'EXISTE' : 'NÃO EXISTE'}`, 'info');
            log(`User: ${localStorage.getItem('app_user') ? 'EXISTE' : 'NÃO EXISTE'}`, 'info');
            
            // Se já estiver logado, redirecionar automaticamente
            if (localStorage.getItem('app_token')) {
                log('Usuário já logado! Redirecionando...', 'success');
                setTimeout(() => {
                    window.location.replace('dashboard-simple.html');
                }, 1000);
            }
        });
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const login = document.getElementById('login').value.trim();
            const senha = document.getElementById('senha').value;
            
            log(`Tentando login com: ${login}`, 'info');
            
            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'login', login, senha })
                });
                
                log(`Resposta HTTP: ${response.status}`, 'info');
                
                const data = await response.json();
                log(`Dados recebidos: ${JSON.stringify(data)}`, 'info');
                
                if (data.success) {
                    log('✅ Login bem-sucedido!', 'success');
                    
                    // Salvar no localStorage
                    localStorage.setItem('app_token', data.token);
                    localStorage.setItem('app_user', JSON.stringify(data.user));
                    
                    log(`Token salvo: ${data.token.substring(0, 20)}...`, 'success');
                    log(`User salvo: ${data.user.nome}`, 'success');
                    
                    // Verificar se salvou
                    const savedToken = localStorage.getItem('app_token');
                    log(`Verificação token: ${savedToken ? 'OK' : 'FALHOU'}`, savedToken ? 'success' : 'error');
                    
                    log('Redirecionando em 2 segundos...', 'info');
                    
                    // Redirecionamento forçado
                    setTimeout(() => {
                        log('Executando redirecionamento...', 'info');
                        
                        // Tentar múltiplas formas de redirecionamento
                        try {
                            window.location.href = 'dashboard-simple.html';
                            log('window.location.href executado', 'success');
                        } catch (e) {
                            log(`Erro no href: ${e.message}`, 'error');
                        }
                    }, 2000);
                    
                } else {
                    log(`❌ Login falhou: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`❌ Erro: ${error.message}`, 'error');
                log(`Stack: ${error.stack}`, 'error');
            }
        });
        
        function clearStorage() {
            localStorage.clear();
            log('LocalStorage limpo!', 'info');
        }
        
        function testRedirect() {
            log('Testando redirecionamento...', 'info');
            window.location.href = 'dashboard-simple.html';
        }
    </script>
</body>
</html>
