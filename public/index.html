<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a84ff">
    <title>Login - App Financeiro</title>
    <link rel="manifest" href="manifest.json">
    <script src="assets/js/theme.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page">
    <button class="btn-theme floating-theme" type="button" data-theme-toggle>
        <span data-theme-label>Tema</span>
    </button>

    <div class="login-container">
        <div class="login-card liquid-login-card">
            <div class="logo">
                <img src="assets/icons/app-icon.svg" alt="App Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 25%;" />
            </div>
            <h1>App Financeiro</h1>
            <p class="subtitle">Controle suas finanças de forma inteligente</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="login">Login</label>
                    <input type="text" id="login" required placeholder="admin@finances.com">
                </div>
                
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required placeholder="••••••">
                </div>
                
                <button type="submit" class="btn-primary" id="btnLogin">
                    Entrar
                </button>
                
                <div class="alert" id="alert" style="display: none;"></div>
            </form>

            <div class="login-credits" aria-label="Créditos">
                <p>Created by Marcelo Torres Alves - 2026</p>
                <p>Todos os direitos reservados.</p>
            </div>
        </div>
    </div>
    
    <script src="assets/js/app.js"></script>

    <!-- SVG Filter for Liquid Glass Refraction -->
    <svg style="visibility: hidden; position: absolute;" width="0" height="0" xmlns="http://www.w3.org/2000/svg" version="1.1">
        <defs>
            <filter id="liquid-distort">
                <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise" seed="2" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>
</body>
</html>
