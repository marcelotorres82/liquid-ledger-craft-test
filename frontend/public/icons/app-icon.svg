<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2fff"/>
      <stop offset="50%" stop-color="#5b2de8"/>
      <stop offset="100%" stop-color="#0d1cb3"/>
    </linearGradient>
    <linearGradient id="glass-fill" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <linearGradient id="spec" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="30%" stop-color="rgba(255,255,255,0.90)"/>
      <stop offset="70%" stop-color="rgba(255,255,255,0.90)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.80)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.25)"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.35)"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.65)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.18)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="icon-shape">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <g clip-path="url(#icon-shape)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Ambient blobs -->
    <circle cx="420" cy="80" r="160" fill="rgba(100,60,255,0.35)"/>
    <circle cx="80" cy="380" r="140" fill="rgba(20,100,255,0.30)"/>
    <circle cx="280" cy="500" r="120" fill="rgba(80,0,200,0.25)"/>

    <!-- Main glass card -->
    <rect x="72" y="88" width="368" height="298" rx="40" ry="40"
          fill="url(#glass-fill)"
          stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>

    <!-- Specular arc (top edge) -->
    <rect x="110" y="88" width="292" height="1.5" rx="1"
          fill="url(#spec)" opacity="0.9"/>

    <!-- Inner bottom shadow -->
    <rect x="82" y="384" width="348" height="1" rx="1"
          fill="rgba(0,0,0,0.25)"/>

    <!-- Chart bar 1 -->
    <rect x="136" y="231" width="56" height="88" rx="12"
          fill="url(#bar1)" opacity="0.85"/>
    <rect x="136" y="231" width="56" height="3" rx="2"
          fill="rgba(255,255,255,0.7)"/>

    <!-- Chart bar 2 (tallest) -->
    <rect x="228" y="159" width="56" height="160" rx="12"
          fill="url(#bar2)"/>
    <rect x="228" y="159" width="56" height="3" rx="2"
          fill="rgba(255,255,255,0.95)"/>

    <!-- Chart bar 3 -->
    <rect x="320" y="197" width="56" height="122" rx="12"
          fill="url(#bar3)" opacity="0.80"/>
    <rect x="320" y="197" width="56" height="3" rx="2"
          fill="rgba(255,255,255,0.60)"/>

    <!-- Trend line -->
    <polyline
      points="164,215 256,143 348,181"
      fill="none"
      stroke="rgba(255,255,255,0.90)"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#glow)"/>

    <!-- Trend dots -->
    <circle cx="164" cy="215" r="7" fill="white" opacity="0.95"/>
    <circle cx="256" cy="143" r="9" fill="white"/>
    <circle cx="256" cy="143" r="5" fill="#64a0ff"/>
    <circle cx="348" cy="181" r="7" fill="white" opacity="0.95"/>

    <!-- Bottom glass pill -->
    <rect x="126" y="364" width="260" height="54" rx="27"
          fill="rgba(255,255,255,0.13)"
          stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <rect x="164" y="364" width="184" height="1.5" rx="1"
          fill="rgba(255,255,255,0.70)"/>

    <!-- Pill: label bars -->
    <rect x="172" y="383" width="48" height="5" rx="2.5" fill="rgba(255,255,255,0.75)"/>
    <rect x="172" y="394" width="36" height="4" rx="2" fill="rgba(255,255,255,0.45)"/>

    <!-- Pill: divider -->
    <rect x="234" y="376" width="1" height="30" rx="0.5" fill="rgba(255,255,255,0.20)"/>

    <!-- Pill: value bars -->
    <rect x="248" y="380" width="64" height="6" rx="3" fill="rgba(255,255,255,0.88)"/>
    <rect x="248" y="392" width="44" height="4" rx="2" fill="rgba(255,255,255,0.45)"/>

    <!-- Pill: up arrow -->
    <polyline points="328,398 336,385 344,398"
      fill="none" stroke="rgba(120,255,180,0.95)" stroke-width="4"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Corner sparkle -->
    <circle cx="452" cy="452" r="18" fill="rgba(255,255,255,0.06)"/>
    <circle cx="452" cy="452" r="6" fill="rgba(255,255,255,0.20)"/>
    <circle cx="448" cy="448" r="2" fill="rgba(255,255,255,0.80)"/>
  </g>
</svg>
