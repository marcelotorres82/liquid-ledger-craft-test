<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Financeiro - Interface Liquid Ledger</title>
    <meta name="description" content="Interface financeira em estilo liquid glass integrada ao App Financeiro" />
    <meta name="theme-color" content="#0a84ff" />
    <link rel="manifest" href="/app/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/app/icons/app-icon.png" />
    <link rel="apple-touch-icon" href="/app/icons/app-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Filtro de distorção Liquid Glass -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
      <defs>
        <filter id="liquid-distort" x="-20%" y="-20%" width="140%" height="140%"
                color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.018 0.012"
                        numOctaves="3" seed="2" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise"
                             scale="6" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
    </svg>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
